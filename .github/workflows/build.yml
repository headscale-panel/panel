name: Build and Publish

on:
  push:
    branches:
      - 'main'
    tags:
      - '**'
  workflow_dispatch:

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          OWNER_LOWER="$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/panel"
          SHORT_SHA="$(printf '%s' "$SHA" | cut -c1-8)"

          if [ "$REF_TYPE" = "tag" ]; then
            VERSION_TAG="dev-${REF_NAME}"
          else
            VERSION_TAG="dev-${SHORT_SHA}"
          fi

          {
            echo "image=${IMAGE}"
            echo "version_tag=${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          build-args: |
            ALPINE_MIRROR=${{ env.ALPINE_MIRROR }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image }}:latest