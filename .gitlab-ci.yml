stages:
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: headscale-panel

build-image:
  stage: build
  image: docker:27
  services:
    - name: docker:dind
      alias: docker
      command: [ "--tls=false","--host=tcp://0.0.0.0:2375"]
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY --username "$HARBOR_USER" --password-stdin
  script:
    - |
      TAG="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
      FULL_IMAGE="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}"

      docker build \
        --pull \
        -t "${FULL_IMAGE}:${TAG}" \
        -t "${FULL_IMAGE}:latest" \
        .

      docker push "${FULL_IMAGE}:${TAG}"
      docker push "${FULL_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
