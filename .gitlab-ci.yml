stages:
  - build
  - deploy

variables:
  # Harbor registry — override these in GitLab CI/CD Settings → Variables
  HARBOR_REGISTRY: "harbor.example.com"
  HARBOR_PROJECT: "library"
  IMAGE_NAME: "headscale-panel"

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
  script:
    - |
      TAG="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
      FULL_IMAGE="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}"

      docker build \
        --pull \
        -t "${FULL_IMAGE}:${TAG}" \
        -t "${FULL_IMAGE}:latest" \
        .

      docker push "${FULL_IMAGE}:${TAG}"
      docker push "${FULL_IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
