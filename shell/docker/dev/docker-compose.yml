name: panel-dev

services:

  headscale:
    image: headscale/headscale:latest
    container_name: panel-dev-headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ../../../backend/data/headscale/lib:/var/lib/headscale
      - ../../../backend/data/headscale/etc:/etc/headscale:ro
    ports:
      - "${HEADSCALE_HTTP_PORT:-5080}:8080"   # Headscale HTTP API
      - "${HEADSCALE_GRPC_PORT:-50443}:50443" # Headscale gRPC for local backend access from host
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - panel-dev

  influxdb:
    image: influxdb:2
    container_name: panel-dev-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-headscale-panel}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-dev-influxdb-token}
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    ports:
      - "${INFLUXDB_HOST_PORT:-8086}:8086"   # InfluxDB UI & API
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - panel-dev

  tailscale-router:
    image: tailscale/tailscale:stable
    container_name: panel-dev-tailscale-router
    hostname: ${TAILSCALE_HOSTNAME:-panel-dev-router}
    restart: unless-stopped
    volumes:
      - ./data/tailscale:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    depends_on:
      headscale:
        condition: service_healthy
    networks:
      - panel-dev

  tailnet-nginx:
    image: nginx:1.27-alpine
    container_name: panel-dev-tailnet-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - tailscale-router
    networks:
      panel-dev:
        ipv4_address: 172.30.0.10

networks:
  panel-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
